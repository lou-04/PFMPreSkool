{% extends 'base.html' %}
{% block title %}Edit Teacher{% endblock %}
{% block page_title %}Edit Teacher{% endblock %}
{% block content %}
<nav aria-label="breadcrumb" class="mb-3"><ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'teacher_list' %}">Teachers</a></li>
    <li class="breadcrumb-item active">Edit</li>
</ol></nav>
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<div class="row g-3">
    <div class="col-md-8"><div class="card"><div class="card-header fw-semibold">Teacher Information</div><div class="card-body">
        <div class="row g-2">
            <div class="col-md-6"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" value="{{ teacher.first_name }}" required></div>
            <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ teacher.last_name }}" required></div>
            <div class="col-md-4"><label class="form-label">Gender</label>
                <select name="gender" class="form-select">
                    <option {% if teacher.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option {% if teacher.gender == 'Female' %}selected{% endif %}>Female</option>
                </select></div>
            <div class="col-md-4"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" class="form-control" value="{{ teacher.date_of_birth|date:'Y-m-d' }}" required></div>
            <div class="col-md-4"><label class="form-label">Joining Date</label><input type="date" name="joining_date" class="form-control" value="{{ teacher.joining_date|date:'Y-m-d' }}" required></div>
            <div class="col-md-6"><label class="form-label">Department</label>
                <select name="department" class="form-select"><option value="">-- None --</option>
                {% for d in departments %}<option value="{{ d.pk }}" {% if teacher.department.pk == d.pk %}selected{% endif %}>{{ d.name }}</option>{% endfor %}
                </select></div>
            <div class="col-md-6"><label class="form-label">Mobile</label><input type="text" name="mobile_number" class="form-control" value="{{ teacher.mobile_number }}" required></div>
            <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ teacher.email }}" required></div>
            <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ teacher.address }}</textarea></div>
            <div class="col-12"><label class="form-label">New Photo (optional)</label><input type="file" name="teacher_image" class="form-control" accept="image/*"></div>
        </div>
    </div></div></div>
    <div class="col-md-4"><div class="card p-3">
        <button type="submit" class="btn btn-warning w-100 mb-2">Update</button>
        <a href="{% url 'teacher_list' %}" class="btn btn-outline-secondary w-100">Cancel</a>
    </div></div>
</div>
</form>
{% endblock %}
