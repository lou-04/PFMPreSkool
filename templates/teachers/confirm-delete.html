{% extends 'base.html' %}
{% block title %}Delete Teacher{% endblock %}
{% block page_title %}Delete Teacher{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white fw-semibold">Confirm Deletion</div>
        <div class="card-body text-center py-4">
            <i class="bi bi-exclamation-triangle fs-1 text-danger mb-3"></i>
            <p>Delete <strong>{{ teacher.first_name }} {{ teacher.last_name }}</strong>?</p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-3">{% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'teacher_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div></div>
{% endblock %}
