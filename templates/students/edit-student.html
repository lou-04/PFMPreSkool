{% extends 'base.html' %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'student_list' %}">Students</a></li>
        <li class="breadcrumb-item active">Edit</li>
    </ol>
</nav>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}
<div class="row g-3">
    <div class="col-md-8">
        <div class="card mb-3">
            <div class="card-header fw-semibold">Student Information</div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-6"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required></div>
                    <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required></div>
                    <div class="col-md-4"><label class="form-label">Gender</label>
                        <select name="gender" class="form-select">
                            <option {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>
                    <div class="col-md-4"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" class="form-control" value="{{ student.date_of_birth|date:'Y-m-d' }}" required></div>
                    <div class="col-md-4"><label class="form-label">Class</label><input type="text" name="student_class" class="form-control" value="{{ student.student_class }}" required></div>
                    <div class="col-md-4"><label class="form-label">Section</label><input type="text" name="section" class="form-control" value="{{ student.section }}" required></div>
                    <div class="col-md-4"><label class="form-label">Joining Date</label><input type="date" name="joining_date" class="form-control" value="{{ student.joining_date|date:'Y-m-d' }}" required></div>
                    <div class="col-md-4"><label class="form-label">Mobile</label><input type="text" name="mobile_number" class="form-control" value="{{ student.mobile_number }}" required></div>
                    <div class="col-md-6"><label class="form-label">Admission Number</label><input type="text" name="admission_number" class="form-control" value="{{ student.admission_number }}" required></div>
                    <div class="col-12"><label class="form-label">New Photo (optional)</label><input type="file" name="student_image" class="form-control" accept="image/*"></div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header fw-semibold">Parent Information</div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-6"><label class="form-label">Father Name</label><input type="text" name="father_name" class="form-control" value="{{ student.parent.father_name }}" required></div>
                    <div class="col-md-6"><label class="form-label">Father Occupation</label><input type="text" name="father_occupation" class="form-control" value="{{ student.parent.father_occupation }}"></div>
                    <div class="col-md-6"><label class="form-label">Father Mobile</label><input type="text" name="father_mobile" class="form-control" value="{{ student.parent.father_mobile }}" required></div>
                    <div class="col-md-6"><label class="form-label">Father Email</label><input type="email" name="father_email" class="form-control" value="{{ student.parent.father_email }}" required></div>
                    <div class="col-md-6"><label class="form-label">Mother Name</label><input type="text" name="mother_name" class="form-control" value="{{ student.parent.mother_name }}" required></div>
                    <div class="col-md-6"><label class="form-label">Mother Occupation</label><input type="text" name="mother_occupation" class="form-control" value="{{ student.parent.mother_occupation }}"></div>
                    <div class="col-md-6"><label class="form-label">Mother Mobile</label><input type="text" name="mother_mobile" class="form-control" value="{{ student.parent.mother_mobile }}" required></div>
                    <div class="col-md-6"><label class="form-label">Mother Email</label><input type="email" name="mother_email" class="form-control" value="{{ student.parent.mother_email }}" required></div>
                    <div class="col-md-6"><label class="form-label">Present Address</label><textarea name="present_address" class="form-control" rows="2">{{ student.parent.present_address }}</textarea></div>
                    <div class="col-md-6"><label class="form-label">Permanent Address</label><textarea name="permanent_address" class="form-control" rows="2">{{ student.parent.permanent_address }}</textarea></div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3">
            <button type="submit" class="btn btn-warning w-100 mb-2">Update Student</button>
            <a href="{% url 'student_list' %}" class="btn btn-outline-secondary w-100">Cancel</a>
        </div>
    </div>
</div>
</form>
{% endblock %}
