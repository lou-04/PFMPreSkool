{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add Student{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="{% url 'student_list' %}">Students</a></li>
        <li class="breadcrumb-item active">Add</li>
    </ol>
</nav>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}
<div class="row g-3">
    <div class="col-md-8">
        <div class="card mb-3">
            <div class="card-header fw-semibold">Student Information</div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-6"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label">Student ID</label><input type="text" name="student_id" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label">Gender</label>
                        <select name="gender" class="form-select" required>
                            <option value="">Select</option>
                            <option>Male</option><option>Female</option>
                        </select>
                    </div>
                    <div class="col-md-4"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label">Class</label><input type="text" name="student_class" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label">Section</label><input type="text" name="section" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label">Joining Date</label><input type="date" name="joining_date" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Mobile</label><input type="text" name="mobile_number" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Admission Number</label><input type="text" name="admission_number" class="form-control" required></div>
                    <div class="col-12"><label class="form-label">Photo</label><input type="file" name="student_image" class="form-control" accept="image/*"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header fw-semibold">Parent Information</div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-6"><label class="form-label">Father Name</label><input type="text" name="father_name" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Father Occupation</label><input type="text" name="father_occupation" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">Father Mobile</label><input type="text" name="father_mobile" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Father Email</label><input type="email" name="father_email" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Mother Name</label><input type="text" name="mother_name" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Mother Occupation</label><input type="text" name="mother_occupation" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">Mother Mobile</label><input type="text" name="mother_mobile" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Mother Email</label><input type="email" name="mother_email" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Present Address</label><textarea name="present_address" class="form-control" rows="2" required></textarea></div>
                    <div class="col-md-6"><label class="form-label">Permanent Address</label><textarea name="permanent_address" class="form-control" rows="2" required></textarea></div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3">
            <button type="submit" class="btn btn-primary w-100 mb-2">Save Student</button>
            <a href="{% url 'student_list' %}" class="btn btn-outline-secondary w-100">Cancel</a>
        </div>
    </div>
</div>
</form>
{% endblock %}
