{% extends 'base.html' %}
{% block title %}Delete Exam{% endblock %}
{% block page_title %}Delete Exam{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
    <div class="card border-danger"><div class="card-header bg-danger text-white">Confirm Deletion</div>
    <div class="card-body text-center py-4">
        <p>Delete exam <strong>{{ exam.name }}</strong>?</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">{% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'exam_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div></div>
</div></div>
{% endblock %}
