{% extends 'base.html' %}
{% block title %}Edit Exam{% endblock %}
{% block page_title %}Edit Exam{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header fw-semibold">Edit Exam</div><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Exam Name</label><input type="text" name="name" class="form-control" value="{{ exam.name }}" required></div>
        <div class="mb-3"><label class="form-label">Subject</label>
            <select name="subject" class="form-select">
            {% for s in subjects %}<option value="{{ s.pk }}" {% if exam.subject.pk == s.pk %}selected{% endif %}>{{ s.name }}</option>{% endfor %}
            </select></div>
        <div class="mb-3"><label class="form-label">Exam Date</label><input type="date" name="exam_date" class="form-control" value="{{ exam.exam_date|date:'Y-m-d' }}" required></div>
        <div class="row">
            <div class="col"><label class="form-label">Total Marks</label><input type="number" name="total_marks" class="form-control" value="{{ exam.total_marks }}"></div>
            <div class="col"><label class="form-label">Pass Marks</label><input type="number" name="pass_marks" class="form-control" value="{{ exam.pass_marks }}"></div>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-warning">Update</button>
            <a href="{% url 'exam_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
    </div></div>
</div></div>
{% endblock %}
