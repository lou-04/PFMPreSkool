{% extends 'base.html' %}
{% block title %}Add Exam{% endblock %}
{% block page_title %}Add Exam{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header fw-semibold">New Exam</div><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Exam Name</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Subject</label>
            <select name="subject" class="form-select" required><option value="">-- Select --</option>
            {% for s in subjects %}<option value="{{ s.pk }}">{{ s.name }}</option>{% endfor %}
            </select></div>
        <div class="mb-3"><label class="form-label">Exam Date</label><input type="date" name="exam_date" class="form-control" required></div>
        <div class="row">
            <div class="col"><label class="form-label">Total Marks</label><input type="number" name="total_marks" class="form-control" value="100" required></div>
            <div class="col"><label class="form-label">Pass Marks</label><input type="number" name="pass_marks" class="form-control" value="40" required></div>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'exam_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
    </div></div>
</div></div>
{% endblock %}
