{% extends 'base.html' %}
{% block title %}Edit Subject{% endblock %}
{% block page_title %}Edit Subject{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header fw-semibold">Edit Subject</div><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" value="{{ subject.name }}" required></div>
        <div class="mb-3"><label class="form-label">Code</label><input type="text" name="code" class="form-control" value="{{ subject.code }}" required></div>
        <div class="mb-3"><label class="form-label">Department</label>
            <select name="department" class="form-select"><option value="">-- None --</option>
            {% for d in departments %}<option value="{{ d.pk }}" {% if subject.department.pk == d.pk %}selected{% endif %}>{{ d.name }}</option>{% endfor %}
            </select></div>
        <div class="mb-3"><label class="form-label">Teacher</label>
            <select name="teacher" class="form-select"><option value="">-- None --</option>
            {% for t in teachers %}<option value="{{ t.pk }}" {% if subject.teacher.pk == t.pk %}selected{% endif %}>{{ t.first_name }} {{ t.last_name }}</option>{% endfor %}
            </select></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ subject.description }}</textarea></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">Update</button>
            <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
    </div></div>
</div></div>
{% endblock %}
