{% extends 'base.html' %}
{% block title %}Add Subject{% endblock %}
{% block page_title %}Add Subject{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header fw-semibold">New Subject</div><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Code</label><input type="text" name="code" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Department</label>
            <select name="department" class="form-select"><option value="">-- None --</option>
            {% for d in departments %}<option value="{{ d.pk }}">{{ d.name }}</option>{% endfor %}
            </select></div>
        <div class="mb-3"><label class="form-label">Teacher</label>
            <select name="teacher" class="form-select"><option value="">-- None --</option>
            {% for t in teachers %}<option value="{{ t.pk }}">{{ t.first_name }} {{ t.last_name }}</option>{% endfor %}
            </select></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2"></textarea></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
    </div></div>
</div></div>
{% endblock %}
