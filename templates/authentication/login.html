{% extends 'base.html' %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreSkool - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #3498db); min-height: 100vh; }
        .login-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
        .brand-title { color: #2c3e50; font-weight: 800; font-size: 2rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container" style="max-width:420px">
        <div class="card login-card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill fs-1 text-primary"></i>
                <h2 class="brand-title">PreSkool</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger alert-dismissible">{{ message }}<button class="btn-close" data-bs-dismiss="alert"></button></div>
            {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
            <hr>
            <div class="text-center text-muted small">
                No account? <a href="{% url 'signup' %}">Sign up here</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
