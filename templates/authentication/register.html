{% extends 'base.html' %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreSkool - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #3498db); min-height: 100vh; }
        .register-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-4">
    <div class="container" style="max-width:480px">
        <div class="card register-card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill fs-1 text-primary"></i>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Join PreSkool today</p>
            </div>
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger alert-dismissible">{{ message }}<button class="btn-close" data-bs-dismiss="alert"></button></div>
            {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
            <hr>
            <div class="text-center text-muted small">
                Already have an account? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
