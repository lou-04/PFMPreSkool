{% extends 'base.html' %}
{% block title %}Edit Timetable Entry{% endblock %}
{% block page_title %}Edit Timetable Entry{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header fw-semibold">Edit Entry</div><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="row g-2">
            <div class="col-md-6"><label class="form-label">Class</label><input type="text" name="class_name" class="form-control" value="{{ entry.class_name }}" required></div>
            <div class="col-md-6"><label class="form-label">Section</label><input type="text" name="section" class="form-control" value="{{ entry.section }}" required></div>
            <div class="col-md-6"><label class="form-label">Subject</label>
                <select name="subject" class="form-select">
                {% for s in subjects %}<option value="{{ s.pk }}" {% if entry.subject.pk == s.pk %}selected{% endif %}>{{ s.name }}</option>{% endfor %}
                </select></div>
            <div class="col-md-6"><label class="form-label">Teacher</label>
                <select name="teacher" class="form-select"><option value="">-- None --</option>
                {% for t in teachers %}<option value="{{ t.pk }}" {% if entry.teacher.pk == t.pk %}selected{% endif %}>{{ t.first_name }} {{ t.last_name }}</option>{% endfor %}
                </select></div>
            <div class="col-md-4"><label class="form-label">Day</label>
                <select name="day" class="form-select">
                {% for val, label in days %}<option value="{{ val }}" {% if entry.day == val %}selected{% endif %}>{{ label }}</option>{% endfor %}
                </select></div>
            <div class="col-md-4"><label class="form-label">Start Time</label><input type="time" name="start_time" class="form-control" value="{{ entry.start_time|time:'H:i' }}" required></div>
            <div class="col-md-4"><label class="form-label">End Time</label><input type="time" name="end_time" class="form-control" value="{{ entry.end_time|time:'H:i' }}" required></div>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-warning">Update</button>
            <a href="{% url 'timetable_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
    </div></div>
</div></div>
{% endblock %}
