{% extends 'base.html' %}
{% block title %}Edit Holiday{% endblock %}
{% block page_title %}Edit Holiday{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
    <div class="card"><div class="card-header fw-semibold">Edit Holiday</div><div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" value="{{ holiday.name }}" required></div>
        <div class="mb-3"><label class="form-label">Date</label><input type="date" name="date" class="form-control" value="{{ holiday.date|date:'Y-m-d' }}" required></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ holiday.description }}</textarea></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">Update</button>
            <a href="{% url 'holiday_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
    </div></div>
</div></div>
{% endblock %}
