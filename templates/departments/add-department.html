{% extends 'base.html' %}
{% block title %}Add Department{% endblock %}
{% block page_title %}Add Department{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card"><div class="card-header fw-semibold">New Department</div>
    <div class="card-body">
    <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'department_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
    </div></div>
</div></div>
{% endblock %}
